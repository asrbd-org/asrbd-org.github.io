# Theme
theme: jekyll-theme-chirpy

# Language & Timezone
lang: en
timezone: Asia/Dhaka

# SEO Settings
title: ASRBD - Cyber Security Bangladesh
tagline: Advanced Security Researchers Bangladesh
description: ASRBD (Advanced Security Researchers Bangladesh) is a non-profit organization promoting cybersecurity awareness, ethical hacking education, and digital safety across Bangladesh.

# Site URL
url: "https://asrbd-org.github.io"
baseurl: ""

# Plugins
# plugins:

# Organization Branding
logo: /assets/img/logo.png
avatar: /assets/img/logo.png
social_preview_image: /assets/img/asrbd-preview.png

# GitHub
github:
  username: asrbd-org


social:
  name: ASRBD - Advanced Security Researchers Bangladesh
  email: asrbd.org@gmail.com
  links:
    - https://github.com/asrbd-org
    - https://www.facebook.com/asrbd.org
    - https://www.linkedin.com/company/asrbd

# Site Verification
webmaster_verifications:
  google: m7ZZZoEVVjclyFPYkjeq75E15tr5nNNlrb88C3_ozaw


# Analytics (Google Analytics 4)
	
google_analytics:
  id: G-45Z9XSPQHK  # Replace with your GA4 ID



# Page Views
# pageviews:
#   provider: goatcounter

# Theme Mode (auto = system preference)
theme_mode:

# CDN (optional)
cdn:

favicon: /assets/img/favicons/favicon.ico

# Comments (Giscus)
comments:
  provider: giscus
  giscus:
    repo: asrbd-org/asrbd-org.github.io
    repo_id: R_kgDORoZImA # Add from https://giscus.app
    category: General
    category_id: DIC_kwDORoZImM4C4kyc # Add from https://giscus.app
    mapping: pathname
    input_position: bottom
    lang: en
    reactions_enabled: 1

# Self-hosted Assets (Security Best Practice)
assets:
  self_host:
    enabled: true

# Progressive Web App
pwa:
  enabled: true
  cache:
    enabled: true

# Pagination
paginate: 10

# Table of Contents
toc: true

# Markdown & Syntax Highlighting
kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

# Collections
collections:
  tabs:
    output: true
    sort_by: order

# Defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /posts/:title/

  - scope:
      path: _drafts
    values:
      comments: false

  - scope:
      path: ""
      type: tabs
    values:
      layout: page
      permalink: /:title/

# Sass
sass:
  style: compressed

# HTML Compression
compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

# Exclusions
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - purgecss.js
  - "*.config.js"
  - "package*.json"

# Archives
jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/